<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Server's Timezones</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Geist+Pixel:wght@400..700&display=swap"
    rel="stylesheet"
  >

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 40px 20px;

      font-family: "Geist Pixel", monospace;
      color: #443653;

      background-image:
        linear-gradient(
          rgba(120, 90, 155, 0.45),
          rgba(120, 90, 155, 0.45)
        ),
        url("four.jpg");

      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    .page {
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
    }

    .title-card {
      max-width: 700px;
      margin: 0 auto 25px;
      padding: 34px 30px;

      text-align: center;
      color: white;

      border: 2px solid rgba(255, 255, 255, 0.55);
      border-radius: 24px;

      background-image:
        linear-gradient(
          rgba(95, 75, 140, 0.45),
          rgba(75, 55, 120, 0.55)
        ),
        url("one.jpg");

      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;

      box-shadow:
        0 12px 30px rgba(104, 78, 135, 0.25);
    }

    .title-card h1 {
      margin: 0;

      color: white;
      font-size: clamp(2.1rem, 5vw, 3.2rem);
      line-height: 1.2;
      letter-spacing: 2px;

      text-shadow:
        0 2px 8px rgba(0, 0, 0, 0.4);
    }

    .subtitle-card {
      max-width: 520px;
      margin: 0 auto 35px;
      padding: 22px;

      text-align: center;
      color: white;

      border: 2px solid rgba(255, 255, 255, 0.55);
      border-radius: 22px;

      background-image:
        linear-gradient(
          rgba(95, 75, 140, 0.45),
          rgba(75, 55, 120, 0.55)
        ),
        url("two.jpg");

      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;

      box-shadow:
        0 12px 30px rgba(104, 78, 135, 0.25);
    }

    .divider {
      margin: 0 0 14px;

      color: #F7EFFF;
      font-size: clamp(0.75rem, 2.5vw, 1.1rem);
      line-height: 1.4;
      letter-spacing: 2px;

      text-shadow:
        0 0 8px rgba(255, 255, 255, 0.4);
    }

    .subtitle {
      margin: 0;

      color: rgba(255, 255, 255, 0.96);
      font-size: 1rem;
      line-height: 1.5;

      text-shadow:
        0 2px 6px rgba(0, 0, 0, 0.35);
    }

    #friend-list {
      display: grid;
      grid-template-columns:
        repeat(auto-fit, minmax(230px, 1fr));
      gap: 20px;
    }

    .friend-card {
      position: relative;
      overflow: hidden;
      min-height: 290px;
      padding: 28px 22px;

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;

      text-align: center;
      color: white;

      border: 2px solid rgba(255, 255, 255, 0.55);
      border-radius: 24px;

      background-image:
        linear-gradient(
          rgba(95, 75, 140, 0.35),
          rgba(75, 55, 120, 0.45)
        ),
        url("stars.jpg");

      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;

      box-shadow:
        0 12px 30px rgba(104, 78, 135, 0.25);

      transition:
        transform 0.25s ease,
        box-shadow 0.25s ease;
    }

    .friend-card:hover {
      transform: translateY(-6px);

      box-shadow:
        0 18px 38px rgba(104, 78, 135, 0.35);
    }

    .friend-roles {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 7px;
      margin-bottom: 12px;
    }

    .friend-role {
      display: inline-block;
      padding: 5px 11px;

      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 999px;

      background: rgba(255, 255, 255, 0.22);
      color: white;

      font-size: 0.85rem;
      font-weight: 700;
      line-height: 1.2;

      text-shadow:
        0 1px 4px rgba(0, 0, 0, 0.35);
    }

    .friend-name {
      width: 100%;
      margin: 0;

      text-align: center;
      font-size: 1.65rem;
      line-height: 1.25;
      letter-spacing: 1px;

      text-shadow:
        0 2px 7px rgba(0, 0, 0, 0.4);
    }

    .friend-utc {
      display: inline-block;
      margin: 12px auto 0;
      padding: 6px 13px;

      border-radius: 999px;

      background: rgba(239, 230, 250, 0.88);
      color: #5d4775;

      font-size: 0.85rem;
      font-weight: 700;
      line-height: 1.2;
    }

    .friend-time {
      width: 100%;
      margin: 20px 0 6px;
      padding: 4px 0 10px;

      text-align: center;
      font-size: 2.7rem;
      line-height: 1.3;
      font-weight: 700;

      text-shadow:
        0 2px 10px rgba(0, 0, 0, 0.45),
        0 0 12px rgba(255, 255, 255, 0.3);
    }

    .friend-date {
      width: 100%;
      margin: 6px 0 0;

      text-align: center;
      color: rgba(255, 255, 255, 0.95);

      font-size: 0.9rem;
      line-height: 1.35;

      text-shadow:
        0 2px 5px rgba(0, 0, 0, 0.4);
    }

    .friend-status {
      display: inline-block;
      margin: 18px 0 10px;
      padding: 8px 14px;

      border-radius: 999px;

      background: rgba(255, 255, 255, 0.9);
      color: #5b4971;

      font-size: 0.85rem;
      font-weight: 700;
      line-height: 1.2;
    }

    footer {
      margin-top: 40px;
      text-align: center;

      color: white;

      font-size: 0.95rem;
      line-height: 1.5;

      text-shadow:
        0 2px 6px rgba(0, 0, 0, 0.4);
    }

    @media (max-width: 520px) {
      body {
        padding: 28px 14px;
      }

      .title-card {
        padding: 28px 18px;
      }

      .subtitle-card {
        padding: 20px 16px;
      }

      .friend-card {
        min-height: 270px;
      }

      .friend-time {
        font-size: 2.4rem;
      }

      .divider {
        letter-spacing: 1px;
      }
    }
  </style>
</head>

<body>
  <div class="page">

    <div class="title-card">
      <h1>Server's Timezones</h1>
    </div>

    <div class="subtitle-card">
      <div class="divider">
        ✦────────────୨ৎ────────────✦
      </div>

      <p class="subtitle">
        Thank you for visiting!
      </p>
    </div>

    <main id="friend-list"></main>

    <footer>
      This clock updates automatically!<br>
      Still in progress — some timezones are placeholders.
    </footer>
  </div>

    <script>
    const friends = [
      {
        name: "Fami",
        utc: 3,
        roles: []
      },
      {
        name: "Annie",
        utc: 3,
        roles: ["Owner"]
      },
      {
        name: "C. Hamster",
        utc: 3,
        roles: []
      },
      {
        name: "Cece",
        utc: 1,
        roles: ["Admin"]
      },
      {
        name: "Maow",
        utc: 1,
        roles: ["Mod"]
      },
      {
        name: "Noelle",
        utc: -4,
        roles: []
      },
      {
        name: "Bing",
        utc: -4,
        roles: []
      },
      {
        name: "Mocha",
        utc: -4,
        roles: ["Paired", "Coffee's"]
      },
            {
        name: "Malice",
        utc: -4,
        roles: ["Mod"]
      },
      {
        name: "Trace",
        utc: -5,
        roles: []
      },
      {
        name: "Serenity",
        utc: -5,
        roles: []
      },
      {
        name: "Toji",
        utc: -7,
        roles: []
      },
      {
        name: "Twinkletoes",
        utc: -7,
        roles: ["Mod"]
      },
      {
        name: "Coffee",
        utc: -8,
        roles: ["Paired", "Mocha's"]
      }
    ];

    const friendList =
      document.getElementById("friend-list");

    function getFriendTime(offset) {
      const now = new Date();

      const utcMilliseconds =
        now.getTime() +
        now.getTimezoneOffset() * 60000;

      return new Date(
        utcMilliseconds + offset * 3600000
      );
    }

    function formatUtcOffset(offset) {
      const sign = offset >= 0 ? "+" : "−";
      const absoluteOffset = Math.abs(offset);

      const hours =
        Math.floor(absoluteOffset);

      const minutes =
        Math.round(
          (absoluteOffset - hours) * 60
        );

      if (minutes === 0) {
        return `UTC${sign}${hours}`;
      }

      return (
        `UTC${sign}${hours}:` +
        String(minutes).padStart(2, "0")
      );
    }

    function getStatus(hour) {
      if (hour >= 23 || hour < 7) {
        return "Perhaps sleeping?";
      }

      if (hour < 10) {
        return "Good morning!";
      }

      if (hour < 18) {
        return "Maybe free?";
      }

      if (hour < 22) {
        return "Good evening!";
      }

      return "It's getting late.";
    }

    function createRoles(roles) {
      if (!roles || roles.length === 0) {
        return "";
      }

      return `
        <div class="friend-roles">
          ${roles
            .map(
              role => `
                <span class="friend-role">
                  ${role}
                </span>
              `
            )
            .join("")}
        </div>
      `;
    }

    function createFriendCard(friend) {
      const friendTime =
        getFriendTime(friend.utc);

      const time =
        friendTime.toLocaleTimeString(
          "en-GB",
          {
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit"
          }
        );

      const date =
        friendTime.toLocaleDateString(
          "en-US",
          {
            weekday: "long",
            month: "long",
            day: "numeric"
          }
        );

      const status =
        getStatus(friendTime.getHours());

      const utcLabel =
        formatUtcOffset(friend.utc);

      const roleBadges =
        createRoles(friend.roles);

      return `
        <section class="friend-card">

          ${roleBadges}

          <h2 class="friend-name">
            ${friend.name}
          </h2>

          <div class="friend-utc">
            ${utcLabel}
          </div>

          <p class="friend-time">
            ${time}
          </p>

          <p class="friend-date">
            ${date}
          </p>

          <span class="friend-status">
            ${status}
          </span>

        </section>
      `;
    }

    function updateClocks() {
      friendList.innerHTML =
        friends
          .map(createFriendCard)
          .join("");
    }

    updateClocks();

    setInterval(
      updateClocks,
      1000
    );
  </script>
</body>
</html>
