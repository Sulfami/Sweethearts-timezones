<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Our Little Timezone</title>

  <!-- Geist Pixel font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Geist+Pixel:wght@400..700&display=swap"
    rel="stylesheet"
  >

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 40px 20px;

      font-family: "Geist Pixel", monospace;
      color: #443653;

      background:
        radial-gradient(
          circle at top,
          rgba(255, 255, 255, 0.8),
          transparent 55%
        ),
        linear-gradient(
          135deg,
          #EFE6FA,
          #f8efff,
          #e9e4fa
        );
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    .page {
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 8px;
      text-align: center;
      font-size: clamp(2rem, 5vw, 3.2rem);
      color: #765b91;
      letter-spacing: 1px;

      text-shadow:
        0 2px 8px rgba(255, 255, 255, 0.9);
    }

    .subtitle {
      margin: 0 0 35px;
      text-align: center;
      color: #806e91;
      font-size: 1.05rem;
    }

    #friend-list {
      display: grid;
      grid-template-columns:
        repeat(auto-fit, minmax(230px, 1fr));
      gap: 20px;
    }

.friend-card {
    position: relative;
    overflow: hidden;
    min-height: 270px;
    padding: 28px 22px;

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;

    text-align: center;

    /* keep the rest of your styles here */
}

      box-shadow:
        0 12px 30px rgba(104, 78, 135, 0.25),
        inset 0 0 30px rgba(255, 255, 255, 0.08);

      transition:
        transform 0.25s ease,
        box-shadow 0.25s ease;
    }

    .friend-card:hover {
      transform: translateY(-6px);

      box-shadow:
        0 18px 38px rgba(104, 78, 135, 0.35),
        inset 0 0 30px rgba(255, 255, 255, 0.12);
    }

    .friend-name {
      margin: 0;
      font-size: 1.7rem;
      letter-spacing: 1px;

      text-shadow:
        0 2px 7px rgba(0, 0, 0, 0.4);
    }

    .friend-utc {
      display: inline-block;
      margin-top: 12px;
      padding: 6px 13px;

      border: 1px solid rgba(255, 255, 255, 0.45);
      border-radius: 999px;

      background: rgba(239, 230, 250, 0.85);
      color: #5d4775;

      font-size: 0.9rem;
      font-weight: 700;

      backdrop-filter: blur(6px);
    }

    .friend-time {
    margin: 24px 0 5px;

    font-size: 2.8rem;   /* slightly smaller */

    line-height: 1.25;   /* important! */

    padding: 4px 0;      /* gives the font room */

    font-weight: 700;

    text-shadow:
        0 2px 10px rgba(0,0,0,.45),
        0 0 12px rgba(255,255,255,.3);
    }

    .friend-date {
      margin: 8px 0 0;
      color: rgba(255, 255, 255, 0.95);
      font-size: 0.95rem;

      text-shadow:
        0 2px 5px rgba(0, 0, 0, 0.4);
    }

    .friend-status {
      display: inline-block;
      margin-top: 18px;
      padding: 8px 14px;

      border: 1px solid rgba(255, 255, 255, 0.45);
      border-radius: 999px;

      background: rgba(255, 255, 255, 0.88);
      color: #5b4971;

      font-size: 0.9rem;
      font-weight: 700;

      backdrop-filter: blur(6px);
    }

    footer {
      margin-top: 40px;
      text-align: center;
      color: #806e91;
      font-size: 0.95rem;
    }

    @media (max-width: 520px) {
      body {
        padding: 28px 14px;
      }

      .friend-card {
        min-height: 250px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <h1>Server's Timezones</h1>

    <p class="subtitle">
      Thank you for visiting!
    </p>

    <main id="friend-list"></main>

    <footer>
      This clock updates automatically!
    </footer>
  </div>

  <script>
    /*
      Change the names and UTC offsets here.

      UTC+5:30 = 5.5
      UTC+9:30 = 9.5
    */

    const friends = [
      {
        name: "Fami",
        utc: 3
      },
      {
        name: "Annie",
        utc: 3
      },
      {
        name: "Maow",
        utc: 1
      },
      {
        name: "Noelle",
        utc: -4
      },
      {
        name: "Bing",
        utc: -4
      }
    ];

    const friendList =
      document.getElementById("friend-list");

    function getFriendTime(offset) {
      const now = new Date();

      const utcMilliseconds =
        now.getTime() +
        now.getTimezoneOffset() * 60_000;

      return new Date(
        utcMilliseconds + offset * 3_600_000
      );
    }

    function formatUtcOffset(offset) {
      const sign = offset >= 0 ? "+" : "−";
      const absoluteOffset = Math.abs(offset);

      const hours = Math.floor(absoluteOffset);

      const minutes = Math.round(
        (absoluteOffset - hours) * 60
      );

      if (minutes === 0) {
        return `UTC${sign}${hours}`;
      }

      return (
        `UTC${sign}${hours}:` +
        String(minutes).padStart(2, "0")
      );
    }

    function getStatus(hour) {
      if (hour >= 23 || hour < 7) {
        return "Perhaps sleeping?";
      }

      if (hour < 10) {
        return "Good morning!";
      }

      if (hour < 18) {
        return "Maybe free?";
      }

      if (hour < 22) {
        return "Good evening!";
      }

      return "It's getting late.";
    }

    function createFriendCard(friend) {
      const friendTime =
        getFriendTime(friend.utc);

      const time =
        friendTime.toLocaleTimeString(
          "en-GB",
          {
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit"
          }
        );

      const date =
        friendTime.toLocaleDateString(
          "en-US",
          {
            weekday: "long",
            month: "long",
            day: "numeric"
          }
        );

      const hour = friendTime.getHours();
      const status = getStatus(hour);

      const utcLabel =
        formatUtcOffset(friend.utc);

      return `
        <section class="friend-card">
          <h2 class="friend-name">
            ❤︎ ${friend.name} ❤︎
          </h2>

          <div class="friend-utc">
            ${utcLabel}
          </div>

          <p class="friend-time">
            ${time}
          </p>

          <p class="friend-date">
            ${date}
          </p>

          <span class="friend-status">
            ${status}
          </span>
        </section>
      `;
    }

    function updateClocks() {
      friendList.innerHTML = friends
        .map(createFriendCard)
        .join("");
    }

    updateClocks();

    setInterval(updateClocks, 1000);
  </script>
</body>
</html>
