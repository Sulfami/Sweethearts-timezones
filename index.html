<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Server's Timezones</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Geist+Pixel:wght@400..700&display=swap"
    rel="stylesheet"
  >

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 40px 20px;
      font-family: "Geist Pixel", monospace;
      color: #443653;
      background: #EFE6FA;
    }

    .page {
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 8px;
      text-align: center;
      font-size: clamp(2rem, 5vw, 3.2rem);
      color: #765b91;
      letter-spacing: 1px;
    }

    .subtitle {
      margin: 0 0 35px;
      text-align: center;
      color: #806e91;
      font-size: 1.05rem;
    }

    #friend-list {
      display: grid;
      grid-template-columns:
        repeat(auto-fit, minmax(230px, 1fr));
      gap: 20px;
    }

    .friend-card {
  position: relative;
  overflow: hidden;
  min-height: 270px;
  padding: 28px 22px;
  border: 2px solid rgba(255,255,255,.55);
  border-radius: 24px;

  background-image:
    linear-gradient(
      rgba(95,75,140,.35),
      rgba(75,55,120,.45)
    ),
    url("stars.jpg");

  background-size: cover;
  background-position: center;

  color: white;

  box-shadow:
    0 12px 30px rgba(104,78,135,.25);

  transition: transform .25s ease;
}

    .friend-card:hover {
      transform: translateY(-6px);

      box-shadow:
        0 18px 38px rgba(104, 78, 135, 0.35);
    }

    .friend-name {
      width: 100%;
      margin: 0;
      text-align: center;
      font-size: 1.65rem;
      letter-spacing: 1px;

      text-shadow:
        0 2px 7px rgba(0, 0, 0, 0.4);
    }

    .friend-utc {
      display: inline-block;
      margin: 12px auto 0;
      padding: 6px 13px;

      border-radius: 999px;

      background: rgba(239, 230, 250, 0.88);
      color: #5d4775;

      font-size: 0.85rem;
      font-weight: 700;
    }

    .friend-time {
      width: 100%;
      margin: 20px 0 6px;
      padding: 4px 0 10px;

      text-align: center;
      font-size: 2.7rem;
      line-height: 1.3;
      font-weight: 700;
      letter-spacing: 0;

      text-shadow:
        0 2px 10px rgba(0, 0, 0, 0.45),
        0 0 12px rgba(255, 255, 255, 0.3);
    }

    .friend-date {
      width: 100%;
      margin: 6px 0 0;

      text-align: center;
      color: rgba(255, 255, 255, 0.95);
      font-size: 0.9rem;

      text-shadow:
        0 2px 5px rgba(0, 0, 0, 0.4);
    }

    .friend-status {
      display: inline-block;
      margin-top: 18px;
      padding: 8px 14px;

      border-radius: 999px;

      background: rgba(255, 255, 255, 0.9);
      color: #5b4971;

      font-size: 0.85rem;
      font-weight: 700;
    }

    footer {
      margin-top: 40px;
      text-align: center;
      color: #806e91;
      font-size: 0.95rem;
    }

    @media (max-width: 520px) {
      body {
        padding: 28px 14px;
      }

      .friend-card {
        min-height: 250px;
      }

      .friend-time {
        font-size: 2.4rem;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <h1>Server's Timezones</h1>

    <p class="subtitle">
      Thank you for visiting!
    </p>

    <main id="friend-list"></main>

    <footer>
      This clock updates automatically!
    </footer>
  </div>

  <script>
    const friends = [
      {
        name: "Fami",
        utc: 3
      },
      {
        name: "Annie",
        utc: 3
      },
      {
        name: "Maow",
        utc: 1
      },
      {
        name: "Noelle",
        utc: -4
      },
      {
        name: "Bing",
        utc: -4
      }, 
         {
        name: "Mocha",
        utc: -4
      }
    ];

    const friendList =
      document.getElementById("friend-list");

    function getFriendTime(offset) {
      const now = new Date();

      const utcMilliseconds =
        now.getTime() +
        now.getTimezoneOffset() * 60000;

      return new Date(
        utcMilliseconds + offset * 3600000
      );
    }

    function formatUtcOffset(offset) {
      const sign = offset >= 0 ? "+" : "−";
      const absoluteOffset = Math.abs(offset);

      const hours = Math.floor(absoluteOffset);
      const minutes = Math.round(
        (absoluteOffset - hours) * 60
      );

      if (minutes === 0) {
        return `UTC${sign}${hours}`;
      }

      return (
        `UTC${sign}${hours}:` +
        String(minutes).padStart(2, "0")
      );
    }

    function getStatus(hour) {
      if (hour >= 23 || hour < 7) {
        return "Perhaps sleeping?";
      }

      if (hour < 10) {
        return "Good morning!";
      }

      if (hour < 18) {
        return "Maybe free?";
      }

      if (hour < 22) {
        return "Good evening!";
      }

      return "It's getting late.";
    }

    function createFriendCard(friend) {
      const friendTime =
        getFriendTime(friend.utc);

      const time =
        friendTime.toLocaleTimeString(
          "en-GB",
          {
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit"
          }
        );

      const date =
        friendTime.toLocaleDateString(
          "en-US",
          {
            weekday: "long",
            month: "long",
            day: "numeric"
          }
        );

      const hour = friendTime.getHours();
      const status = getStatus(hour);
      const utcLabel =
        formatUtcOffset(friend.utc);

      return `
        <section class="friend-card">
          <h2 class="friend-name">
            ❤︎ ${friend.name} ❤︎
          </h2>

          <div class="friend-utc">
            ${utcLabel}
          </div>

          <p class="friend-time">
            ${time}
          </p>

          <p class="friend-date">
            ${date}
          </p>

          <span class="friend-status">
            ${status}
          </span>
        </section>
      `;
    }

    function updateClocks() {
      friendList.innerHTML = friends
        .map(createFriendCard)
        .join("");
    }

    updateClocks();
    setInterval(updateClocks, 1000);
  </script>
</body>
</html>
